<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18",
          "react-dom/client": "https://esm.sh/react-dom@18/client"
        }
      }
    </script>

    <script data-type="module" type="text/babel">
      import React from "react";
      import { createRoot } from "react-dom/client";

      // Un-memoized: re-renders every time the parent (App) re-renders, even if props didn't change
      function Panel() {
        return (
          <div>
            <p>TimeStamp : {new Date().toString()}</p>
          </div>
        );
      }

      // React.memo wraps a component and skips re-rendering if its props are shallowly equal.
      // MemoPanel receives no props, so it will never re-render after the first mount.
      const MemoPanel = React.memo(Panel);

      // You can also pass an inline function directly to React.memo
      const MemoPanel2 = React.memo(() => {
        return (
          <div>
            <p>Timestamp: {new Date().toString()}</p>
          </div>
        );
      });

      function App() {
        // Every keystroke updates `text`, causing App to re-render.
        // Watch the timestamps: Panel updates each time, MemoPanel and MemoPanel2 stay frozen.
        const [text, setText] = React.useState("");

        return (
          <div>
            <input
              type="text"
              value={text}
              placeholder="Type here"
              onChange={(e) => setText(e.target.value)}
            />
            <Panel />
            <MemoPanel />
            <MemoPanel2 />
          </div>
        );
      }
      const root = createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
