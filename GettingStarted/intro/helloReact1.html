<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18",
          "react-dom/client": "https://esm.sh/react-dom@18/client"
        }
      }
    </script>
    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";

      // React.createElement(type, props, ...children) builds a virtual DOM element.
      // This is what JSX compiles down to — using it directly shows what JSX hides.
      const retailer = React.createElement(
        "div",
        { id: "retailerInfo" }, // second arg: props object (null means no props)
        React.createElement("h1", null, "Catalog"),
        React.createElement(
          "ul",
          null,
          // Each child needs a unique key when built from data; hard-coded children don't require it
          React.createElement("li", null, "Swansea City shirt"),
          React.createElement("li", null, "Cardiff City shirt"),
          React.createElement("li", null, "Bugatti Divo"),
          React.createElement("li", null, "55in OLED HD TV"),
          React.createElement("li", null, "Carving skis"),
          React.createElement("li", null, "Ski boots"),
        ),
        React.createElement("h1", null, "Shops"),
        React.createElement(
          "ul",
          null,
          React.createElement("li", null, "London"),
          React.createElement("li", null, "Paris"),
          React.createElement("li", null, "NY"),
          React.createElement("li", null, "Swansea"),
        ),
      );

      // createRoot replaces the legacy ReactDOM.render() from React 17 and below
      const root = createRoot(document.getElementById("root"));
      root.render(retailer);
    </script>
  </body>
</html>
