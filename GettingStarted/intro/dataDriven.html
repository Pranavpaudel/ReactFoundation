<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18",
          "react-dom/client": "https://esm.sh/react-dom@18/client"
        }
      }
    </script>

    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";

      const products = [
        "Swansea City shirt",
        "Cardiff City shirt",
        "Bugatti Divo",
        "55in OLED HD TV",
        "Carving skis",
        "Ski boots",
      ];

      const prodList = React.createElement(
        "ul",
        null,
        products.map((pName, index) =>
          React.createElement("li", { key: index }, pName),
        ),
      );

      const retailer = React.createElement(
        "div",
        null,
        React.createElement("h1", null, "Catalogue"),
        prodList,
      );

      const root = createRoot(document.getElementById("root"));
      root.render(retailer);
    </script>
  </body>
</html>
