<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18",
          "react-dom/client": "https://esm.sh/react-dom@18/client"
        }
      }
    </script>

    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";

      // Class-based components extend React.Component and must implement render().
      // They were the only stateful option before React Hooks (16.8).
      class ProductList extends React.Component{
        render(){
            return React.createElement('ul', null,
                React.createElement('li', null, 'Swansea City shirt'),
                React.createElement('li', null,'Cardiff City shirt' ),
                React.createElement('li', null, 'Bugatti Divo')
            )
        }
      }

      // Each class component encapsulates its own markup — the key benefit of component-based design
      class ShopList extends React.Component{
        render(){
            return React.createElement('ul', null,
                React.createElement('li', null, 'London'),
                React.createElement('li', null, 'Paris'),
                React.createElement('li', null, 'NY')
            )
        }
      }

      // App is the root component that composes the two child components.
      // Passing a class (e.g. ProductList) instead of a string ('div') tells React to render a component.
      class App extends React.Component{
        render(){
            return React.createElement('div', null,
                React.createElement("h1", null, "Catalogue"),
                React.createElement(ProductList),
                React.createElement("h1", null, "Shops"),
                React.createElement(ShopList)
            )
        }
      }

      const app = React.createElement(App)

      const root = createRoot(document.getElementById('root'))
      root.render(app)
    </script>
  </body>
</html>
