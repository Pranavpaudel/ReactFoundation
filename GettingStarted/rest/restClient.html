<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18",
          "react-dom/client": "https://esm.sh/react-dom@18/client"
        }
      }
    </script>

    <script data-type="module" type="text/babel">
      import React from "react";
      import { createRoot } from "react-dom/client";

      function App() {
        const url = "http://127.0.0.1:3000/api/thumbnailUrls";

        function FetchDataV1() {
          console.log("Fetching data V1");
          const promise = window.fetch(url);

          promise.then((response) => {
            const promise2 = response.json();
            promise2.then((data) => console.log(`Result : ${data}`));
          });
        }

        async function FetchDataV2() {
          console.log("Calling Rest Services in V2");
          const response = await window.fetch(url);
          const data = await response.json();
          console.log(`Result : ${data}`);
        }
        return (
          <div>
            <button onClick={FetchDataV1}>Fetch Data [V1]</button>
            <button onClick={FetchDataV2}>Fetch Data [V2]</button>
          </div>
        );
      }

      const root = createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
