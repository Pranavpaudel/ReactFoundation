<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .gallery {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        position: fixed;
        width: 100%;
        left: 4%;
        -webkit-transform: translateX(-2%);
        transform: translateX(-2%);
      }
      .largeImage {
        width: 94%;
      }
      .smallImage {
        width: 10%;
        margin-right: 2%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18",
          "react-dom/client": "https://esm.sh/react-dom@18/client"
        }
      }
    </script>

    <script data-type="module" type="text/babel">
      import React from "react";
      import { createRoot } from "react-dom/client";

      function Gallery({ baseUrl }) {
        const [selectedUrl, setSelectedUrl] = React.useState(undefined);
        const [isLoading, setIsLoading] = React.useState(false);
        const [url, setUrl] = React.useState([]);

        React.useEffect(() => {
          const fetchUrl = "http://localhost:3000/api/thumbnailUrls";

          async function FetchData(url) {
            setIsLoading(true);
            try {
              const response = await window.fetch(url);
              if (!response.ok) {
                throw Error("response.statusText");
              }
              const result = await response.json();
              setUrl(result);
              setIsLoading(false);
            } catch (error) {
              console.log(error);
            }
          }

          FetchData(fetchUrl);
        }, []);

        const mainContent = selectedUrl ? (
          <img src={`${baseUrl}/${selectedUrl}`} className="largeImage" />
        ) : (
          <p>No Image Selected</p>
        );

        return (
          <div className="gallery">
            {isLoading ? (
              <p>Loading Url from Rest</p>
            ) : (
              <>
                <div>
                  {url.map((url, i) => (
                    <img
                      src={`${baseUrl}/${url}`}
                      key={i}
                      className="smallImage"
                      onClick={() => {
                        console.log(
                          `Selected Thumbnail: ${url} at ${new Date().toString()}`,
                        );
                        setSelectedUrl(url);
                      }}
                    />
                  ))}
                </div>
                <div>{mainContent}</div>
              </>
            )}
          </div>
        );
      }

      const root = createRoot(document.getElementById("root"));
      root.render(<Gallery baseUrl="http://olsensoft.com/thumbnails" />);
    </script>
  </body>
  
</html>
